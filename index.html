<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Przegląd Kina Muza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-main: #050608;
      --text-main: #f5f5f5;
      --text-muted: #d7d7d7;
      --accent: #ffb347;
      --border-soft: rgba(255, 255, 255, 0.18);
      --card-bg: #11131c;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue",
        Arial, sans-serif;
      background: #000;
      color: var(--text-main);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      background: #000;
    }

    /* HERO */
    .hero {
      position: relative;
      min-height: 100vh;
      padding: 40px clamp(24px, 6vw, 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-center {
      position: relative;
      z-index: 2;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.3em;
    }

    .hero-kicker {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .hero-title {
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .hero-subtitle {
      margin-top: 16px;
      font-size: 14px;
      letter-spacing: 0.24em;
      color: var(--text-muted);
    }

    .hero-photos {
      position: absolute;
      inset: 0;
      pointer-events: none;
      filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.7));
    }

    .hero-photo {
      position: absolute;
      width: 320px;
      max-width: 50vw;
      aspect-ratio: 16 / 9;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      border-radius: 0;
      border: none;
      overflow: visible;
      transform-origin: center;
      opacity: 0.95;
    }

    .hero-photo:nth-child(1) {
      top: 14%;
      left: 6%;
      transform: rotate(-11deg);
      background-image: url("lynch.png");
    }

    .hero-photo:nth-child(2) {
      top: 4%;
      right: 6%;
      transform: rotate(8deg);
      background-image: url("zulawsi.png");
    }

    .hero-photo:nth-child(3) {
      bottom: 0%;
      left: 22%;
      transform: rotate(5deg);
      background-image: url("COPPOLA.png");
    }

    .hero-photo:nth-child(4) {
      bottom: -6%;
      right: 16%;
      transform: rotate(-7deg);
      background-image: url("EGGERS.png");
    }

    .hero-gradient {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at center,
        rgba(0, 0, 0, 0) 0,
        rgba(0, 0, 0, 0.4) 48%,
        rgba(0, 0, 0, 0.85) 100%
      );
      z-index: 1;
    }

    /* INTRO TEXT UNDER HERO */
    .intro {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px clamp(24px, 5vw, 48px) 56px;
      display: grid;
      grid-template-columns: minmax(0, 260px) minmax(0, 1fr);
      gap: 32px;
      color: #050608;
      background: #ffffff;
    }

    .intro-address {
      padding: 18px 20px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: radial-gradient(circle at top, #15182a 0, #050816 40%, #060613 100%);
      color: var(--text-main);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.65);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .intro-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
    }

    .intro-address-main span {
      display: block;
      font-size: 16px;
    }

    .intro-description {
      font-family: "Garamond", Georgia, serif;
      line-height: 1.7;
      font-size: 17px;
    }

    .intro-description p + p {
      margin-top: 10px;
    }

    /* GALLERY SECTION */
    .gallery {
      background: #050608;
      padding: 60px clamp(24px, 6vw, 64px) 80px;
      color: var(--text-main);
    }

    .gallery-header {
      max-width: 1100px;
      margin: 0 auto 28px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 20px;
      opacity: 0.9;
    }

    .slider-viewport {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    .gallery-grid {
      display: flex;
      width: 100%;
      transition: transform 0.5s ease;
    }

    .card {
      position: relative;
      cursor: pointer;
      overflow: hidden;
      border-radius: 18px;
      background: #000;
      border: none;
      flex: 0 0 100%;
      max-width: 100%;
      min-height: min(72vh, 560px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 40px 90px rgba(0, 0, 0, 0.95);
    }

    .card-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background-color: #000;
      filter: saturate(1.15);
      transform: scale(1.02);
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .card:hover .card-image {
      transform: scale(1.05);
      filter: saturate(1.25);
    }

    .card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.9) 0,
        rgba(0, 0, 0, 0.35) 55%,
        transparent 100%
      );
      pointer-events: none;
    }

    .card-content {
      position: absolute;
      inset-inline: 28px;
      bottom: 26px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-transform: uppercase;
    }

    .card-name {
      font-size: 18px;
      letter-spacing: 0.22em;
    }

    .card-dates {
      font-size: 12px;
      letter-spacing: 0.26em;
      color: var(--text-muted);
    }

    .slider-nav {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .slider-button {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #fff;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-inline: 8px;
      font-size: 20px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .slider-button:hover {
      background: rgba(0, 0, 0, 0.9);
      transform: translateY(-2px);
    }

    /* DETAIL OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: #050608;
      display: none;
      z-index: 1000;
      color: var(--text-main);
      overflow-y: auto;
    }

    .overlay.active {
      display: block;
    }

    .overlay-header {
      position: relative;
      height: min(420px, 60vh);
      overflow: hidden;
    }

    .overlay-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.2);
    }

    .overlay-header-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.1) 0,
        rgba(0, 0, 0, 0.9) 100%
      );
    }

    .overlay-header-content {
      position: absolute;
      inset-inline: clamp(24px, 6vw, 80px);
      bottom: 40px;
    }

    .overlay-name {
      font-size: clamp(36px, 4.6vw, 56px);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .overlay-bio {
      max-width: 780px;
      font-family: "Garamond", Georgia, serif;
      font-size: 18px;
      color: var(--text-muted);
      line-height: 1.6;
      white-space: pre-line;
    }

    .overlay-close {
      position: absolute;
      top: 24px;
      left: 24px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(5, 6, 14, 0.92);
      color: var(--text-main);
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      z-index: 10;
    }

    .overlay-close::before {
      content: "←";
      font-size: 18px;
    }

    .overlay-body {
      padding: 40px clamp(24px, 6vw, 80px) 64px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .overlay-address {
      margin-bottom: 28px;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .overlay-address strong {
      color: var(--accent);
    }

    .overlay-section-title {
      font-size: 24px;
      margin-bottom: 22px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .program-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .program-day {
      padding: 16px 18px;
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      background: #0b0d18;
    }

    .program-date {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .program-film {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 15px;
      align-items: center;
      margin-bottom: 10px;
    }

    .program-title {
      font-weight: 500;
      flex: 1;
    }

    .program-meta {
      opacity: 0.78;
      min-width: 150px;
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .buy-button {
      margin-left: 16px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: transparent;
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .buy-button:hover {
      background: #fff;
      color: #000;
      transform: translateY(-1px);
    }

    .booking-panel {
      margin-top: 32px;
      padding: 20px 18px 24px;
      border-radius: 12px;
      border: 1px solid var(--border-soft);
      background: #050713;
      display: none;
      gap: 16px;
      flex-direction: column;
    }

    .booking-panel.active {
      display: flex;
    }

    .booking-header {
      font-size: 16px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .booking-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .ticket-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .ticket-row label {
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .ticket-select {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: #050713;
      color: #fff;
      font-size: 14px;
      min-width: 90px;
    }

    .seats-legend {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .seats-grid {
      display: grid;
      grid-template-columns: 0.8fr repeat(10, minmax(0, 1fr));
      gap: 6px;
      padding: 16px 8px 10px;
      border-radius: 8px;
      background: radial-gradient(circle at top, #111827 0, #020617 70%);
      margin-bottom: 12px;
    }

    .screen-label {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9ca3af;
      padding: 6px 0 12px;
      border-bottom: 2px solid rgba(148, 163, 184, 0.7);
      margin: 0 8px 6px;
    }

    .seat-row-label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
    }

    .seat {
      width: 100%;
      padding: 9px 0 7px;
      border-radius: 8px 8px 3px 3px;
      border: 1px solid rgba(148, 163, 184, 0.9);
      background: linear-gradient(to bottom, #1f2937 0%, #020617 100%);
      font-size: 11px;
      color: #e5e7eb;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .seat.selected {
      background: linear-gradient(to bottom, #fb923c 0%, #f97316 100%);
      border-color: #fed7aa;
      color: #111827;
      transform: translateY(-2px);
    }

    .seat.occupied {
      background: #111827;
      border-color: #4b5563;
      color: #4b5563;
      cursor: not-allowed;
    }

    .confirm-button {
      align-self: flex-start;
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      background: #f97316;
      color: #111827;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .confirm-button:hover {
      background: #fb923c;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }

    .purchase-panel {
      display: none;
      margin-top: 28px;
      padding: 20px 18px 22px;
      border-radius: 12px;
      border: 1px solid var(--border-soft);
      background: #020617;
    }

    .purchase-panel.active {
      display: block;
    }

    .purchase-title {
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .purchase-summary {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .ticket-input {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      min-width: min(260px, 100%);
    }

    .ticket-number {
      display: none;
    }

    @media (max-width: 900px) {
      .intro {
        grid-template-columns: minmax(0, 1fr);
      }

      .hero-photo {
        width: 44vw;
      }

      .hero-photo:nth-child(1) {
        left: -4%;
      }

      .hero-photo:nth-child(2) {
        right: -8%;
      }

      .hero-photo:nth-child(3) {
        left: 4%;
      }

      .hero-photo:nth-child(4) {
        right: 0;
      }

      .slider-viewport {
        max-width: 100%;
      }

      .card {
        min-height: 60vh;
      }

      .slider-button {
        width: 38px;
        height: 38px;
        font-size: 18px;
      }
    }

    @media (max-width: 640px) {
      .overlay-close {
        left: 16px;
        top: 16px;
      }

      .gallery-header {
        font-size: 16px;
        letter-spacing: 0.18em;
        text-align: center;
      }

      .card-content {
        inset-inline: 18px;
        bottom: 18px;
      }

      .program-film {
        flex-direction: column;
        align-items: flex-start;
      }

      .program-meta {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-photos">
        <div class="hero-photo"></div>
        <div class="hero-photo"></div>
        <div class="hero-photo"></div>
        <div class="hero-photo"></div>
      </div>
      <div class="hero-gradient"></div>
      <div class="hero-center">
        <div class="hero-kicker">kino muza · poznań</div>
        <div class="hero-title">PRZEGLĄD KINA MUZA</div>
        <div class="hero-subtitle">cykl spotkań z autorskim kinem</div>
      </div>
    </section>

    <section class="gallery">
      <div class="gallery-header">REPERTUAR</div>
      <div class="slider-viewport">
        <div class="gallery-grid" id="galleryGrid">
          <!-- Slajdy generowane w JS -->
        </div>
        <div class="slider-nav">
          <button class="slider-button" id="prevSlide" aria-label="Poprzedni reżyser">‹</button>
          <button class="slider-button" id="nextSlide" aria-label="Następny reżyser">›</button>
        </div>
      </div>
    </section>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-header">
      <button class="overlay-close" id="overlayClose">Powrót</button>
      <img class="overlay-img" id="overlayImg" alt="" />
      <div class="overlay-header-gradient"></div>
      <div class="overlay-header-content">
        <div class="overlay-name" id="overlayName"></div>
        <div class="overlay-bio" id="overlayBio"></div>
      </div>
    </div>
    <div class="overlay-body">
      <div class="overlay-address">
        <strong>Kino Muza</strong> · Adres: Święty Marcin 30, Poznań
      </div>
      <div class="overlay-section-title">Repertuar</div>
      <div class="program-list" id="programList"></div>
      <div class="booking-panel" id="bookingPanel">
        <div class="booking-header" id="bookingHeader">Wybierz seans, miejsca i typ biletu</div>
        <div class="booking-sub" id="bookingSub"></div>
        <div class="ticket-row">
          <label for="reducedCount">Bilet ulgowy</label>
          <select id="reducedCount" class="ticket-select">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <div class="ticket-row">
          <label for="regularCount">Bilet normalny</label>
          <select id="regularCount" class="ticket-select">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <div class="seats-legend">
          Kliknij w wolne miejsca na sali, aby je zarezerwować. Szary = zajęte.
        </div>
        <div class="screen-label">Ekran</div>
        <div class="seats-grid" id="seatsGrid"></div>
        <button class="confirm-button" id="confirmBooking">Potwierdź wybór</button>
      </div>
      <div class="purchase-panel" id="purchasePanel">
        <div class="purchase-title">Strona zakupu</div>
        <div class="purchase-summary" id="purchaseSummary"></div>
        <form class="purchase-form" id="purchaseForm">
          <div class="ticket-row">
            <label for="buyerName">Imię i nazwisko</label>
            <input id="buyerName" name="buyerName" type="text" class="ticket-input" placeholder="Jan Kowalski" required />
          </div>
          <div class="ticket-row">
            <label for="buyerEmail">E‑mail</label>
            <input id="buyerEmail" name="buyerEmail" type="email" class="ticket-input" placeholder="jan@example.com" required />
          </div>
          <div class="ticket-row">
            <label for="buyerPhone">Telefon</label>
            <input id="buyerPhone" name="buyerPhone" type="tel" class="ticket-input" placeholder="+48 ..." />
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const directors = [
      {
        id: "lynch",
        name: "David Lynch",
        dates: "12–14.08",
        image: "lynch.png",
        bio:
          "Amerykański reżyser, scenarzysta, malarz i muzyk, ikona surrealizmu w kinie. " +
          "Znany z tworzenia onirycznych, tajemniczych i psychologicznych thrillerów, takich jak „Twin Peaks”, „Mulholland Drive” czy „Blue Velvet”. " +
          "Jego twórczość często eksploruje mroczne zakamarki amerykańskiej prowincji i ludzkiej podświadomości.\n\n" +
          "Przegląd: 12–14.08",
        program: [
          {
            date: "12.08.26",
            films: [
              { title: "Eraserhead", meta: "16:30 · sala 1" },
              { title: "Lost Highway", meta: "19:00 · sala 2" },
            ],
          },
          {
            date: "13.08.26",
            films: [
              { title: "Twin Peaks", meta: "17:00 · sala 2" },
              { title: "Blue Velvet", meta: "20:00 · sala 2" },
            ],
          },
          {
            date: "14.08.26",
            films: [
              { title: "Dune", meta: "16:00 · sala 1" },
              { title: "Wild at Heart", meta: "19:30 · sala 1" },
            ],
          },
        ],
      },
      {
        id: "zulawski",
        name: "Andrzej Żuławski",
        dates: "8–10.09",
        image: "zulawsi.png",
        bio:
          "Był polskim reżyserem filmowym, scenarzystą i pisarzem, znanym z bezkompromisowego kina pełnego histerii, psychoseksualnych napięć i manierycznej gry aktorskiej. " +
          "Jego twórczość, często balansująca na granicy horroru i dramatu, eksploruje destrukcyjne emocje.\n\n" +
          "Przegląd: 8–10.09",
        program: [
          {

              { title: "On the Silver Globe", meta: "19:00 · sala 2" },
              { title: "Trzecia część nocy", meta: "22:20 · sala 2" },
            ],
          },
          {
            date: "09.09.26",
            films: [
              { title: "Cosmos", meta: "18:00 · sala 1" },
              { title: "Fidelity", meta: "21:30 · sala 2" },
            ],
          },
          {
            date: "10.09.26",
            films: [{ title: "Possession", meta: "20:00 · sala 1" }],
          },
        ],
      },
      {
        id: "tarantino",
        name: "Quentin Tarantino",

        image: "tarantino.png",
        bio:

          "Znany z brutalności, błyskotliwych dialogów, nielinearnej narracji oraz pastiszowych nawiązań do popkultury.\n\n" +

        program: [

              {
                title: "Once Upon a Time in Hollywood",

              },

              { title: "Kill Bill 1", meta: "22:15 · sala 1" },
            ],
          },
          {

              { title: "Kill Bill 2", meta: "17:00 · sala 1" },
              { title: "Django", meta: "20:30 · sala 1" },
            ],
          },
          {
            date: "16.10.26",
            films: [
              { title: "Sin City", meta: "18:45 · sala 2" },
              { title: "The Hateful Eight", meta: "19:30 · sala 1" },
            ],
          },
          {

            films: [{ title: "Pulp Fiction", meta: "20:00 · sala 1" }],
          },
        ],
      },
      {
        id: "coppola",
        name: "Sofia Coppola",
        dates: "10–12.11",
        image: "COPPOLA.png",
        bio:
          "Uznana amerykańska reżyserka, scenarzystka i producentka, znana z autorskiego, nastrojowego kina skupionego na psychologii postaci, izolacji i kobiecej perspektywie, często określana jako mistrzyni subtelności.\n\n" +
          "Przegląd: 10–12.11",
        program: [
          {
            date: "09.11.26",
            films: [
              { title: "Priscilla", meta: "18:00 · sala 1" },
              { title: "The Beguiled", meta: "21:30 · sala 2" },
            ],
          },
          {
            date: "10.11.26",
            films: [
              { title: "Somewhere", meta: "20:00 · sala 1" },
              { title: "The Virgin Suicides", meta: "20:00 · sala 1" },
            ],
          },
          {
            date: "08.11.26",
            films: [
              { title: "Marie Antoinette", meta: "19:00 · sala 2" },
              { title: "Lost in Translation", meta: "22:20 · sala 2" },
            ],
          },
        ],
      },
      {
        id: "eggers",
        name: "Robert Eggers",
        dates: "11–13.12",
        image: "EGGERS.png",
        bio:
          "Amerykański reżyser, scenarzysta i scenograf, specjalizujący się w kinie historycznym z elementami baśni i pogańskich wierzeń. " +
          "Jego filmy charakteryzuje dbałość o szczegóły epoki, w tym użycie autentycznego, starodawnego języka dialogów.\n\n" +
          "Przegląd: 11–13.12",
        program: [
          {
            date: "11.12.26",
            films: [
              { title: "Nosferatu", meta: "18:15 · sala 2" },
              { title: "The Northman", meta: "19:50 · sala 1" },
            ],
          },
          {
            date: "12.12.26",
            films: [{ title: "The Lighthouse", meta: "17:00 · sala 2" }],
          },
          {
            date: "13.12.26",
            films: [
              { title: "The Tell-Tale Heart", meta: "18:00 · sala 1" },
              { title: "The Witch", meta: "19:10 · sala 1" },
            ],
          },
        ],
      },
    ];

    const galleryGrid = document.getElementById("galleryGrid");
    const prevSlide = document.getElementById("prevSlide");
    const nextSlide = document.getElementById("nextSlide");
    const overlay = document.getElementById("overlay");
    const overlayClose = document.getElementById("overlayClose");
    const overlayImg = document.getElementById("overlayImg");
    const overlayName = document.getElementById("overlayName");
    const overlayBio = document.getElementById("overlayBio");
    const programList = document.getElementById("programList");
    const bookingPanel = document.getElementById("bookingPanel");
    const bookingHeader = document.getElementById("bookingHeader");
    const bookingSub = document.getElementById("bookingSub");
    const reducedCountInput = document.getElementById("reducedCount");
    const regularCountInput = document.getElementById("regularCount");
    const seatsGrid = document.getElementById("seatsGrid");
    const confirmBooking = document.getElementById("confirmBooking");
    const purchasePanel = document.getElementById("purchasePanel");
    const purchaseSummary = document.getElementById("purchaseSummary");

    directors.forEach((director) => {
      const card = document.createElement("button");
      card.className = "card";
      card.type = "button";
      card.setAttribute("data-id", director.id);
      card.innerHTML = `
        <img src="${director.image}" alt="${director.name}" class="card-image" />
        <div class="card-gradient"></div>
        <div class="card-content">
          <div class="card-name">${director.name}</div>
          <div class="card-dates">${director.dates}</div>
        </div>
      `;
      galleryGrid.appendChild(card);
    });

    let currentIndex = 0;

    function updateSlider() {
      const offset = -currentIndex * 100;
      galleryGrid.style.transform = `translateX(${offset}%)`;
    }

    let currentBooking = null;

    function openOverlay(directorId) {
      const director = directors.find((d) => d.id === directorId);
      if (!director) return;

      overlayImg.src = director.image;
      overlayImg.alt = director.name;
      overlayName.textContent = director.name;
      overlayBio.textContent = director.bio;

      programList.innerHTML = "";
      bookingPanel.classList.remove("active");
      seatsGrid.innerHTML = "";
      purchasePanel.classList.remove("active");
      purchaseSummary.textContent = "";
      currentBooking = null;
      director.program.forEach((day) => {
        const dayEl = document.createElement("div");
        dayEl.className = "program-day";

        const filmsHtml = day.films
          .map(
            (film) => `
              <div class="program-film">
                <span class="program-title">${film.title}</span>
                <span class="program-meta">${film.meta}</span>
                <button class="buy-button" data-title="${film.title}" data-meta="${film.meta}" data-date="${day.date}">
                  Kup bilet
                </button>
              </div>
            `
          )
          .join("");

        dayEl.innerHTML = `
          <div class="program-date">${day.date}</div>
          ${filmsHtml}
        `;

        programList.appendChild(dayEl);
      });

      overlay.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function closeOverlay() {
      overlay.classList.remove("active");
      document.body.style.overflow = "";
    }

    galleryGrid.addEventListener("click", (event) => {
      const target = event.target.closest(".card");
      if (!target) return;
      openOverlay(target.getAttribute("data-id"));
    });

    prevSlide.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + directors.length) % directors.length;
      updateSlider();
    });

    nextSlide.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % directors.length;
      updateSlider();
    });

    // start od pierwszego slajdu
    updateSlider();

    overlayClose.addEventListener("click", closeOverlay);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && overlay.classList.contains("active")) {
        closeOverlay();
      }
    });

    function buildSeatsGrid() {
      seatsGrid.innerHTML = "";
      const rows = ["A", "B", "C", "D", "E", "F", "G", "H"];
      const seatsPerRow = 10;

      rows.forEach((row) => {
        const label = document.createElement("div");
        label.className = "seat-row-label";
        label.textContent = row;
        seatsGrid.appendChild(label);

        for (let i = 1; i <= seatsPerRow; i++) {
          const seat = document.createElement("button");
          seat.type = "button";
          seat.className = "seat";
          seat.textContent = i;
          seat.dataset.row = row;
          seat.dataset.seat = i;

          // prosta symulacja zajętych miejsc
          if (Math.random() < 0.12) {
            seat.classList.add("occupied");
          }

          seat.addEventListener("click", () => {
            if (seat.classList.contains("occupied")) return;
            seat.classList.toggle("selected");
          });

          seatsGrid.appendChild(seat);
        }
      });
    }

    programList.addEventListener("click", (event) => {
      const button = event.target.closest(".buy-button");
      if (!button) return;

      const title = button.getAttribute("data-title");
      const meta = button.getAttribute("data-meta");
      const date = button.getAttribute("data-date");

      currentBooking = { title, meta, date };

      bookingHeader.textContent = `Wybierz miejsca – ${title}`;
      bookingSub.textContent = `${date} · ${meta}`;
      reducedCountInput.value = "0";
      regularCountInput.value = "0";

      buildSeatsGrid();
      bookingPanel.classList.add("active");

      // przewiń do panelu rezerwacji
      bookingPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    confirmBooking.addEventListener("click", () => {
      if (!currentBooking) {
        alert("Najpierw wybierz seans z repertuaru.");
        return;
      }

      const selectedSeats = Array.from(
        seatsGrid.querySelectorAll(".seat.selected")
      ).map((seat) => `${seat.dataset.row}${seat.dataset.seat}`);

      if (selectedSeats.length === 0) {
        alert("Wybierz przynajmniej jedno miejsce na sali.");
        return;
      }

      const reduced = parseInt(reducedCountInput.value || "0", 10);
      const regular = parseInt(regularCountInput.value || "0", 10);

      if (reduced + regular === 0) {
        alert("Wybierz liczbę biletów ulgowych i/lub normalnych.");
        return;
      }

      purchaseSummary.innerHTML = `
        <p><strong>Seans:</strong> ${currentBooking.title}</p>
        <p><strong>Data i godzina:</strong> ${currentBooking.date} · ${currentBooking.meta}</p>
        <p><strong>Bilety:</strong> ulgowy × ${reduced}, normalny × ${regular}</p>
        <p><strong>Wybrane miejsca:</strong> ${selectedSeats.join(", ")}</p>
        <p style="margin-top:10px;">To prototyp strony zakupu – tutaj możesz dodać np. formularz danych lub przekierowanie do systemu płatności.</p>
      `;

      purchasePanel.classList.add("active");
      purchasePanel.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
